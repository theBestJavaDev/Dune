<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dune: Arrakis First-Person Survival</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f39c12;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #blocker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            cursor: pointer;
            z-index: 20;
        }

        .instructions {
            font-size: 18px;
            line-height: 1.5;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: #d35400;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #hud {
            position: absolute;
            bottom: 20px; left: 20px;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-left: 3px solid #d35400;
        }

        #spice-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #ff9d00;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border: 1px solid #d35400;
            text-shadow: 0 0 10px #ff5500;
        }

        #worm-warning {
            position: absolute;
            top: 15%;
            font-size: 30px;
            color: #ff3300;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 15px #000;
            animation: blinker 0.5s linear infinite;
        }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="hud">
            Location: Deep Desert<br>
            Suit Status: Optimal<br>
            Spice Proximity: Detecting...<br>
            Online Players: 1
        </div>
        <div id="spice-ui">MELANGE COLLECTED: <span id="spice-score">0</span></div>
        <div id="worm-warning">WORMSIGN DETECTED - FIND ROCKS!</div>
    </div>

    <div id="blocker">
        <div>
            <div class="title">Arrakis Exploration</div>
            <div class="instructions">
                <strong>Click to Enter the Desert</strong><br><br>
                W, A, S, D = Move<br>
                SPACE = Jump<br>
                MOUSE = Look around<br>
                ESC = Pause
            </div>
        </div>
    </div>
    <div id="minimap" style="
        position: absolute; 
        bottom: 20px; 
        right: 20px; 
        width: 150px; 
        height: 150px; 
        background: rgba(0, 0, 0, 0.5); 
        border: 2px solid #d35400; 
        border-radius: 50%; 
        overflow: hidden; 
        z-index: 15;">
        <div style="
            position: absolute; 
            top: 50%; left: 50%; 
            width: 6px; height: 6px; 
            background: #00ff00; 
            border-radius: 50%; 
            transform: translate(-50%, -50%);"></div>
        <div id="player-dots"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        const { createClient } = supabase;
        const supabaseClient = createClient('https://clbjiyokjmovijgwybyu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYmppeW9ram1vdmlqZ3d5Ynl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTQyMzEsImV4cCI6MjA5MDgzMDIzMX0.EY8uZZN8hEyncJoi-rswxnKeaeIBTuF_xkwBu-yvF7c');
        const otherPlayers = new Map();
        const myId = Math.random().toString(36).substring(7);

        function createHumanMesh() {
           const group = new THREE.Group();
           const mat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });

            const head = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), mat);
            head.position.y = 16;
            group.add(head);

           const torso = new THREE.Mesh(new THREE.BoxGeometry(4, 8, 2), mat);
           torso.position.y = 11;
           group.add(torso);

           const armGeo = new THREE.BoxGeometry(1, 7, 1);
           const leftArm = new THREE.Mesh(armGeo, mat);
           leftArm.position.set(-2.5, 11, 0);
           group.add(leftArm);

          const rightArm = new THREE.Mesh(armGeo, mat);
           rightArm.position.set(2.5, 11, 0);
          group.add(rightArm);

          const legGeo = new THREE.BoxGeometry(1.5, 8, 1.5);
           const leftLeg = new THREE.Mesh(legGeo, mat);
            leftLeg.position.set(-1, 4, 0);
            group.add(leftLeg);

         const rightLeg = new THREE.Mesh(legGeo, mat);
          rightLeg.position.set(1, 4, 0);
          group.add(rightLeg);

         return group;
        }

        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        let geometry, material, terrain;
        const objects = [];
        let raycaster;

        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        let moveShift = false;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        let spiceParticles;
        const clock = new THREE.Clock();

        let spiceScore = 0;
        const spiceCrystals = [];

        const rocks = [];
        let sandworm = null;
        let wormState = "idle";
        let wormTimer = 0;
        let wormSignParticles;
        let clickRaycaster = new THREE.Raycaster();

        let sparkleSystem;
        let presenceChannel = null;
        let onlinePlayerCount = 1;

        init();
        animate();

        function updatePlayerCountHUD() {
            const hud = document.getElementById('hud');
            hud.innerHTML =
                `Location: Deep Desert<br>` +
                `Suit Status: Optimal<br>` +
                `Spice Proximity: Detecting...<br>` +
                `Online Players: ${onlinePlayerCount}`;
        }

        function updateMinimap() {
            const dotContainer = document.getElementById('player-dots');
            dotContainer.innerHTML = '';

            const MAP_SCALE = 0.2;
            const centerX = 75;
            const centerY = 75;

            otherPlayers.forEach((data) => {
                const relX = (data.targetPos.x - camera.position.x) * MAP_SCALE;
                const relZ = (data.targetPos.z - camera.position.z) * MAP_SCALE;
                const dist = Math.sqrt(relX * relX + relZ * relZ);

                if (dist < 70) {
                    const dot = document.createElement('div');
                    dot.style.position = 'absolute';
                    dot.style.width = '6px';
                    dot.style.height = '6px';
                    dot.style.background = data.isSandwalking ? '#ffd166' : 'red';
                    dot.style.borderRadius = '50%';
                    dot.style.left = (centerX + relX) + 'px';
                    dot.style.top = (centerY + relZ) + 'px';
                    dot.style.transform = 'translate(-50%, -50%)';
                    dotContainer.appendChild(dot);
                }
            });
        }

        function syncPresenceToMinimap() {
            updateMinimap();
        }

        function initPresenceMultiplayer() {
            presenceChannel = supabaseClient.channel('arrakis_room', {
                config: {
                    presence: { key: myId },
                    broadcast: { self: false }
                }
            });

            presenceChannel
                .on('presence', { event: 'sync' }, () => {
                    const state = presenceChannel.presenceState();
                    const seen = new Set();

                    Object.values(state).forEach((entries) => {
                        entries.forEach((p) => {
                            if (!p.id || p.id === myId) return;
                            seen.add(p.id);

                            if (!otherPlayers.has(p.id)) {
                                const mesh = createHumanMesh();
                                scene.add(mesh);
                                otherPlayers.set(p.id, {
                                    mesh,
                                    targetPos: new THREE.Vector3(),
                                    targetRot: 0,
                                    isSandwalking: false
                                });
                            }

                            const data = otherPlayers.get(p.id);
                            data.targetPos.set(p.x ?? 0, p.y ?? 10, p.z ?? 0);
                            data.targetRot = p.rot ?? 0;
                            data.isSandwalking = !!p.isSandwalking;
                        });
                    });

                    otherPlayers.forEach((value, id) => {
                        if (!seen.has(id)) {
                            scene.remove(value.mesh);
                            otherPlayers.delete(id);
                        }
                    });

                    onlinePlayerCount = 1 + seen.size;
                    updatePlayerCountHUD();
                    syncPresenceToMinimap();
                })
                .on('presence', { event: 'join' }, () => {
                    updatePlayerCountHUD();
                    syncPresenceToMinimap();
                })
                .on('presence', { event: 'leave' }, () => {
                    updatePlayerCountHUD();
                    syncPresenceToMinimap();
                })
                .on('broadcast', { event: 'move' }, ({ payload }) => {
                    if (!payload || payload.id === myId) return;

                    if (!otherPlayers.has(payload.id)) {
                        const mesh = createHumanMesh();
                        scene.add(mesh);
                        otherPlayers.set(payload.id, {
                            mesh,
                            targetPos: new THREE.Vector3(),
                            targetRot: 0,
                            isSandwalking: false
                        });
                    }

                    const data = otherPlayers.get(payload.id);
                    data.targetPos.set(payload.pos.x, payload.pos.y, payload.pos.z);
                    data.targetRot = payload.rot;
                    data.isSandwalking = payload.isSandwalking;
                    syncPresenceToMinimap();
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await presenceChannel.track({
                            id: myId,
                            x: camera.position.x,
                            y: camera.position.y,
                            z: camera.position.z,
                            rot: camera.rotation.y,
                            isSandwalking: moveShift
                        });
                        updatePlayerCountHUD();
                    }
                });

            setInterval(async () => {
                if (!presenceChannel || !controls.isLocked) return;

                await presenceChannel.track({
                    id: myId,
                    x: camera.position.x,
                    y: camera.position.y,
                    z: camera.position.z,
                    rot: camera.rotation.y,
                    isSandwalking: moveShift
                });

                presenceChannel.send({
                    type: 'broadcast',
                    event: 'move',
                    payload: {
                        id: myId,
                        pos: {
                            x: camera.position.x,
                            y: camera.position.y,
                            z: camera.position.z
                        },
                        rot: camera.rotation.y,
                        isSandwalking: moveShift
                    }
                });
            }, 100);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xcc8855);
            scene.fog = new THREE.FogExp2(0xcc8855, 0.004);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1500);
            camera.position.y = 10;

            const ambientLight = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.5);
            ambientLight.position.set(0.5, 1, 0.75);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffaa55, 1);
            dirLight.position.set(100, 200, 50);
            scene.add(dirLight);

            controls = new PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', function () {
                controls.lock();
            });

            controls.addEventListener('lock', function () {
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
            });

            scene.add(controls.getObject());

            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': moveShift = true; break;
                    case 'Space':
                        if (canJump === true) velocity.y += 350;
                        canJump = false;
                        break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': moveShift = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            raycaster = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 20);

            geometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            geometry.rotateX(-Math.PI / 2);

            const positionAttribute = geometry.attributes.position;
            for (let i = 0; i < positionAttribute.count; i++) {
                const x = positionAttribute.getX(i);
                const z = positionAttribute.getZ(i);
                
                let y = Math.sin(x / 50) * Math.cos(z / 50) * 20;
                y += Math.sin(x / 200) * Math.cos(z / 200) * 50;
                
                positionAttribute.setY(i, y);
            }
            
            geometry.computeVertexNormals(); 

            material = new THREE.MeshLambertMaterial({ 
                color: 0xd4a373, 
                wireframe: false 
            });

            terrain = new THREE.Mesh(geometry, material);
            scene.add(terrain);
            objects.push(terrain);

            const particleCount = 5000;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                particlePositions[i] = (Math.random() - 0.5) * 1000;
                particlePositions[i + 1] = Math.random() * 50;
                particlePositions[i + 2] = (Math.random() - 0.5) * 1000;
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                color: 0xff5500,
                size: 0.5,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            spiceParticles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(spiceParticles);

            const crystalGeo = new THREE.DodecahedronGeometry(0.8, 0);
            const crystalMat = new THREE.MeshStandardMaterial({ 
                color: 0xff8800, 
                emissive: 0xff4400,
                roughness: 0,
                metalness: 1
            });
            for(let i = 0; i < 40; i++) {
                const crystal = new THREE.Mesh(crystalGeo, crystalMat);
                const x = (Math.random() - 0.5) * 1200;
                const z = (Math.random() - 0.5) * 1200;
                const y = Math.sin(x / 50) * Math.cos(z / 50) * 20 + Math.sin(x / 200) * Math.cos(z / 200) * 50;
                crystal.position.set(x, y + 0.2, z); 
                crystal.rotation.set(Math.random(), Math.random(), Math.random());
                scene.add(crystal);
                spiceCrystals.push(crystal);
            }

            const rockMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, flatShading: true });
            for(let i = 0; i < 15; i++) {
                const rockGeo = new THREE.DodecahedronGeometry(10, 0);
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(0, -9999, 0);
                scene.add(rock);
            }
            const obsidianMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, flatShading: true, roughness: 1 });
            for(let i = 0; i < 20; i++) {
                const g = new THREE.IcosahedronGeometry(15, 1);
                const r = new THREE.Mesh(g, obsidianMat);
                r.position.set(0, -9999, 0);
                scene.add(r);
            }
            const smoothRockMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.9, metalness: 0.1 });
            for(let i = 0; i < 25; i++) {
                const smoothGeo = new THREE.SphereGeometry(15, 32, 32); 
                const rock = new THREE.Mesh(smoothGeo, smoothRockMat);
                rock.position.set(0, -9999, 0);
                scene.add(rock);
            }

            const plateauMat = new THREE.MeshStandardMaterial({ 
                color: 0x362c24,
                roughness: 1.0, 
                metalness: 0.0,
                flatShading: true
            });

            for(let i = 0; i < 4; i++) {
                const rSize = 80 + Math.random() * 50; 
                const plateauGeo = new THREE.IcosahedronGeometry(rSize, 4); 
                
                const pos = plateauGeo.attributes.position;
                for(let j=0; j<pos.count; j++) {
                    const vx = pos.getX(j);
                    const vy = pos.getY(j);
                    const vz = pos.getZ(j);
                    const noise = Math.sin(vx*0.15)*Math.cos(vz*0.15)*4 + Math.sin(vy*0.1)*3;
                    pos.setXYZ(j, vx + noise, vy + noise, vz + noise);
                }
                plateauGeo.computeVertexNormals();

                const rock = new THREE.Mesh(plateauGeo, plateauMat);
                
                const rx = (Math.random() - 0.5) * 1600;
                const rz = (Math.random() - 0.5) * 1600;
                const ry = Math.sin(rx / 50) * Math.cos(rz / 50) * 20 + Math.sin(rx / 200) * Math.cos(rz / 200) * 50;
                
                rock.position.set(rx, ry - 10, rz);
                rock.scale.set(1, 0.35 + Math.random() * 0.1, 1); 
                rock.rotation.y = Math.random() * Math.PI;

                scene.add(rock);
                objects.push(rock);
            }

            createSandworm();

            const sparkleGeo = new THREE.BufferGeometry();
            const sparkleCount = 8000;
            const sparklePos = new Float32Array(sparkleCount * 3);
            for(let i=0; i<sparkleCount*3; i++) sparklePos[i] = (Math.random() - 0.5) * 2000;
            sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
            sparkleSystem = new THREE.Points(sparkleGeo, new THREE.PointsMaterial({
                color: 0xffcc00,
                size: 0.15,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            }));
            scene.add(sparkleSystem);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            initPresenceMultiplayer();
            updatePlayerCountHUD();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onMouseClick);
        }

        function createSandworm() {
            sandworm = new THREE.Group();
            const segmentCount = 20;
            for(let i = 0; i < segmentCount; i++) {
                const radius = 15 - (i * 0.5);
                const segGeo = new THREE.TorusGeometry(radius, 4, 8, 16);
                const segMat = new THREE.MeshLambertMaterial({ color: 0x3d2b1f });
                const seg = new THREE.Mesh(segGeo, segMat);
                seg.rotation.x = Math.PI / 2;
                seg.position.z = i * 8;
                sandworm.add(seg);
            }
            const mouthGeo = new THREE.CylinderGeometry(15, 15, 5, 12, 1, true);
            const mouth = new THREE.Mesh(mouthGeo, new THREE.MeshBasicMaterial({color: 0x000000}));
            mouth.rotation.x = Math.PI / 2;
            mouth.position.z = -2;
            sandworm.add(mouth);

            sandworm.position.y = -100;
            scene.add(sandworm);

            const signGeo = new THREE.BufferGeometry();
            const signPos = new Float32Array(300 * 3);
            signGeo.setAttribute('position', new THREE.BufferAttribute(signPos, 3));
            wormSignParticles = new THREE.Points(signGeo, new THREE.PointsMaterial({color: 0xd4a373, size: 4, transparent: true, opacity: 0.5}));
            scene.add(wormSignParticles);
        }

        function onMouseClick(event) {
            if (!controls.isLocked) return;
            clickRaycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = clickRaycaster.intersectObjects(spiceCrystals);
            if (intersects.length > 0) {
                const target = intersects[0].object;
                if (target.visible) {
                    target.visible = false;
                    spiceScore += 50;
                    document.getElementById('spice-score').innerText = spiceScore;
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateMultiplayer(delta, time) {
            otherPlayers.forEach((data) => {
                data.mesh.position.lerp(new THREE.Vector3(data.targetPos.x, data.targetPos.y - 18, data.targetPos.z), 0.1);
                data.mesh.rotation.y = THREE.MathUtils.lerp(data.mesh.rotation.y, data.targetRot, 0.1);

                if (data.isSandwalking) {
                    data.mesh.rotation.z = Math.sin(time * 0.005) * 0.1;
                } else {
                    data.mesh.rotation.z = 0;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);
    
            renderer.render(scene, camera);
    
            if (typeof otherPlayers !== 'undefined') {
                updateMultiplayer(delta, time);
            }

            if (controls.isLocked === true) {
                const positions = spiceParticles.geometry.attributes.position.array;
                for(let i = 0; i < positions.length; i+=3) {
                    positions[i] += 0.05; 
                    if(positions[i] > 500) positions[i] = -500; 
                }
                spiceParticles.geometry.attributes.position.needsUpdate = true;
        
                sparkleSystem.rotation.y += 0.001;
                sparkleSystem.material.opacity = 0.3 + Math.sin(time * 0.005) * 0.2;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 
        
                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                const pPos = controls.getObject().position;
                const dY = Math.sin(pPos.x/50)*Math.cos(pPos.z/50)*20 + Math.sin(pPos.x/200)*Math.cos(pPos.z/200)*50;
        
                let targetFloorHeight = dY;
                let onRock = false;

                raycaster.ray.origin.copy(pPos);
                const intersections = raycaster.intersectObjects(objects, false);
        
                if (intersections.length > 0) {
                    const hitPoint = intersections[0].point.y;
                    if (hitPoint > targetFloorHeight) {
                        targetFloorHeight = hitPoint;
                        if (intersections[0].object.geometry.type.includes("Icosahedron") || 
                            intersections[0].object.geometry.type.includes("Sphere")) {
                            onRock = true;
                        }
                    }
                }

                if (pPos.y < targetFloorHeight + 8) {
                    velocity.y = 0;
                    pPos.y = targetFloorHeight + 8;
                    canJump = true;
                }

                updateSandworm(delta, pPos, targetFloorHeight, onRock);
        
                updateMinimap();
            }

            prevTime = time;
        }

        function updateSandworm(delta, pPos, dY, onRock) {
            wormTimer += delta;

            if (wormState === "idle" && wormTimer > 20 && Math.random() < 0.01) {
                wormState = "wormsign";
                wormTimer = 0;
                const angle = Math.random() * Math.PI * 2;
                sandworm.position.set(pPos.x + Math.cos(angle)*100, -50, pPos.z + Math.sin(angle)*100);
                document.getElementById('worm-warning').style.display = 'block';
            }

            if (wormState === "wormsign") {
                camera.position.x += (Math.random()-0.5) * 0.5;
                camera.position.y += (Math.random()-0.5) * 0.5;
                
                const p = wormSignParticles.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] = sandworm.position.x + (Math.random()-0.5)*80;
                    p[i+1] = dY + Math.random()*20;
                    p[i+2] = sandworm.position.z + (Math.random()-0.5)*80;
                }
                wormSignParticles.geometry.attributes.position.needsUpdate = true;

                if (wormTimer > 6) {
                    wormState = "attack";
                    wormTimer = 0;
                }
            }

            if (wormState === "attack") {
                sandworm.lookAt(pPos.x, dY, pPos.z);
                sandworm.position.lerp(new THREE.Vector3(pPos.x, dY + 10, pPos.z), 0.05);
                
                if (sandworm.position.distanceTo(pPos) < 20) {
                    if (!onRock) {
                        alert("The Desert has claimed you. Shai-Hulud has fed.");
                        location.reload();
                    }
                }

                if (wormTimer > 4) {
                    wormState = "idle";
                    wormTimer = 0;
                    sandworm.position.y = -200;
                    document.getElementById('worm-warning').style.display = 'none';
                    const p = wormSignParticles.geometry.attributes.position.array;
                    for(let i=0; i<p.length; i++) p[i] = 0;
                    wormSignParticles.geometry.attributes.position.needsUpdate = true;
                }
            }
        }
    </script>
</body>
</html>
